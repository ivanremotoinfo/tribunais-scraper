services:
  - type: web
    name: tribunais-scraper
    env: node
    region: oregon          # us-west — mais próximo do Brasil disponível no free tier
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_PUPPETEER
        value: "false"        # mantenha false no free tier (512MB RAM)
      - key: CACHE_TTL
        value: "3600"
      - key: REQUEST_TIMEOUT
        value: "15000"
      - key: CORS_ORIGINS
        # Substitua pelo seu domínio GitHub Pages
        value: "https://SEU_USUARIO.github.io,https://suporte.adv.br"
