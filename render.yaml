services:
  - type: web
    name: tribunais-scraper
    env: node
    region: ohio
    plan: free
    buildCommand: PUPPETEER_SKIP_DOWNLOAD=true npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_PUPPETEER
        value: "false"
      - key: CACHE_TTL
        value: "3600"
      - key: REQUEST_TIMEOUT
        value: "20000"
      - key: CORS_ORIGINS
        value: "https://ivanremotoinfo.github.io,https://suporteadv.suporte.adv.br"
